name: Poll NFL schedule

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

# Never let two polls overlap — the snapshot commit-back would race.
concurrency:
  group: poll
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Poll and post changes
        run: npm run once
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}

      - name: Commit updated snapshot
        run: |
          if git status --porcelain data/ | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "chore: update schedule snapshot"
            git pull --rebase origin main
            git push
          fi
